# 🌐 Netlify Configuration File
# UITS IT Club Web Platform

[build]
  # Serve static assets directly from the public/ folder
  publish = "public"

  # Environment variables configuration for Netlify (set in Netlify UI)
  [build.environment]
    MONGODB_URI = "$MONGODB_URI"
    FORM_URL = "$FORM_URL"
    JWT_SECRET = "$JWT_SECRET"

  # No build compilation is necessary since the frontend is built in pure HTML/CSS/JS
  command = ""

[[redirects]]
  # SPA Route Fallback: Allow client-side routing to fallback gracefully to index.html
  from = "/*"
  to = "/index.html"
  status = 200
